name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy pytest flake8

    - name: Lint with flake8
      run: |
        flake8 AI/GeneticAlgorithm/ --max-line-length=127
        flake8 AI/ReinforcementLearning/ --max-line-length=127
        flake8 tests/ --max-line-length=127

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v
